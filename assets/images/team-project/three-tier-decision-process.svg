<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 720" font-family="Helvetica, Arial, sans-serif" font-size="14">
  <title>Three-tier decision process</title>
  <desc>UML activity diagram. A methodological decision is checked against Tier 1 (peer-reviewed literature) first; if absent, Tier 2 (established practice: library or framework defaults, recognised practitioner conventions, tool-documentation guidance); if also absent, Tier 3 (pragmatic project context, flagged for future work). All paths log the chosen tier in the decision register. Takes inspiration from the evidence pyramid in evidence-based medicine (Sackett et al., 1996; refined in Murad et al., 2016) as a pragmatic assisted-decision approach.</desc>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#222"/>
    </marker>
  </defs>

  <!-- Start node -->
  <circle cx="360" cy="40" r="12" fill="#222"/>

  <!-- Action: methodological decision -->
  <rect x="240" y="80" width="240" height="44" rx="22" ry="22" fill="#f4f6f8" stroke="#222" stroke-width="1.5"/>
  <text x="360" y="107" text-anchor="middle">Methodological decision</text>

  <!-- Decision 1: peer-reviewed source? -->
  <polygon points="360,160 500,220 360,280 220,220" fill="#fdfbe8" stroke="#222" stroke-width="1.5"/>
  <text x="360" y="217" text-anchor="middle">Peer-reviewed source</text>
  <text x="360" y="235" text-anchor="middle">available?</text>

  <!-- Tier 1 action (right, on Yes) -->
  <rect x="540" y="200" width="160" height="44" rx="6" ry="6" fill="#e8f4ec" stroke="#1f7a3a" stroke-width="1.5"/>
  <text x="620" y="222" text-anchor="middle" font-weight="bold">Tier 1</text>
  <text x="620" y="238" text-anchor="middle">peer-reviewed literature</text>

  <!-- Decision 2: established practice? (below diamond 1, on No path) -->
  <polygon points="360,320 500,380 360,440 220,380" fill="#fdfbe8" stroke="#222" stroke-width="1.5"/>
  <text x="360" y="375" text-anchor="middle">Established practice</text>
  <text x="360" y="393" text-anchor="middle">covers it?</text>

  <!-- Tier 2 action (right, on Yes) -->
  <rect x="540" y="360" width="160" height="44" rx="6" ry="6" fill="#e8eef9" stroke="#1f3f7a" stroke-width="1.5"/>
  <text x="620" y="382" text-anchor="middle" font-weight="bold">Tier 2</text>
  <text x="620" y="398" text-anchor="middle">established practice</text>

  <!-- Tier 3 action (below diamond 2, on No path) -->
  <rect x="240" y="470" width="240" height="60" rx="6" ry="6" fill="#fbeee8" stroke="#7a3a1f" stroke-width="1.5"/>
  <text x="360" y="494" text-anchor="middle" font-weight="bold">Tier 3</text>
  <text x="360" y="512" text-anchor="middle">pragmatic project context</text>
  <text x="360" y="526" text-anchor="middle" font-style="italic" font-size="12">(flagged for future work)</text>

  <!-- Merge / Log action -->
  <rect x="240" y="580" width="240" height="44" rx="6" ry="6" fill="#f4f6f8" stroke="#222" stroke-width="1.5"/>
  <text x="360" y="607" text-anchor="middle">Log tier in decision register</text>

  <!-- End node -->
  <circle cx="360" cy="670" r="14" fill="white" stroke="#222" stroke-width="1.5"/>
  <circle cx="360" cy="670" r="8"  fill="#222"/>

  <!-- Arrows -->
  <!-- Start -> Methodological decision -->
  <line x1="360" y1="52" x2="360" y2="78" stroke="#222" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Methodological decision -> Diamond 1 -->
  <line x1="360" y1="124" x2="360" y2="158" stroke="#222" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Diamond 1 Yes -> Tier 1 -->
  <line x1="500" y1="220" x2="538" y2="220" stroke="#222" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="510" y="212" font-size="12" font-style="italic">yes</text>
  <!-- Diamond 1 No -> Diamond 2 -->
  <line x1="360" y1="280" x2="360" y2="318" stroke="#222" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="368" y="304" font-size="12" font-style="italic">no</text>
  <!-- Diamond 2 Yes -> Tier 2 -->
  <line x1="500" y1="380" x2="538" y2="380" stroke="#222" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="510" y="372" font-size="12" font-style="italic">yes</text>
  <!-- Diamond 2 No -> Tier 3 -->
  <line x1="360" y1="440" x2="360" y2="468" stroke="#222" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="368" y="462" font-size="12" font-style="italic">no</text>

  <!-- Tier 1 -> merge column on the far right (routed around Tier 2 box). -->
  <path d="M620,244 L710,244 L710,600" fill="none" stroke="#222" stroke-width="1.5"/>
  <!-- Tier 2 -> joins the merge column at x=710 horizontally. -->
  <path d="M620,404 L710,404" fill="none" stroke="#222" stroke-width="1.5"/>
  <!-- Junction marker where Tier 2 meets the Tier 1 column. -->
  <circle cx="710" cy="404" r="3.5" fill="#222"/>
  <!-- Merge column -> Log (single arrow entering the Log box from the right). -->
  <path d="M710,600 L482,600" fill="none" stroke="#222" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Tier 3 -> Log -->
  <line x1="360" y1="530" x2="360" y2="578" stroke="#222" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Log -> End -->
  <line x1="360" y1="624" x2="360" y2="656" stroke="#222" stroke-width="1.5" marker-end="url(#arrow)"/>
</svg>
