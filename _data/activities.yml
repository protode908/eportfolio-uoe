- id: unit7-perceptron
  unit: '7'
  title: Perceptron Tutorial
  activity: '"Work through the three perceptron notebooks: a single neuron with step activation and fixed weights, a single-layer perceptron learning the AND operator by weight update, and a multi-layer perceptron learning XOR by back-propagation. Discuss why XOR requires the hidden layer." (University of Essex Online, n.d.)'
  description: ''
  figure: /assets/images/unit-7/xor_error_curve.png
  figure_alt: XOR multi-layer perceptron training error curve
  figure_caption: Multi-layer perceptron training error curve on XOR (2-3-1 sigmoid network). E7.2
  body: ''
  micro_what: Worked through the perceptron notebooks from the simple sum-and-step idea to AND, then to the 2-3-1 sigmoid network for XOR. AND was useful because the weight updates stayed easy to follow. XOR was the more important part for me because the single linear boundary failed, and the hidden layer made the difference visible through the error curve and decision surface. I am comfortable with Python scripting, but this was different from scripting a cleaning or regression flow. Here I had to follow what the weights were doing step by step.
  micro_what_lo:
  - LO2
  - LO3
  micro_so_what: The main lesson was the geometry, not only the code. AND is linearly separable, so a single-layer perceptron can learn it. XOR is not, so the model needs the hidden layer to build a more useful boundary. Before this activity I understood the idea of back-propagation in theory, but it still felt abstract. Seeing the small network learn XOR made neural networks less like a black box. This matters for my own learning because deep learning was the area where I had the biggest gap compared with classical ML.
  micro_so_what_lo:
  - LO2
  - LO3
  micro_now_what: 'I will keep the AND-versus-XOR example as my basic check before reaching for a more complex model: can one linear boundary do the job, or is the pattern already non-linear? For later neural-network work, I will also look at the training curve and decision surface before trusting the result. A model can run successfully in code and still not be learning the pattern I think it is learning.'
  micro_now_what_lo:
  - LO3
  feature: false
  deep_page: ''
  links:
  - label: PERCEPTRON / AND SUMMARY (E7.1)
    url: /assets/images/unit-7/simple_perceptron_summary.png
  - label: XOR DECISION SURFACE (E7.3)
    url: /assets/images/unit-7/xor_decision_surface.png
  status: complete
  key_takeaway: The AND and XOR exercises made neural networks much less abstract for me. AND worked with one linear boundary, but XOR needed the hidden layer. Seeing that small network learn XOR helped me understand that the hidden layer is about geometry, not magic.
  collapse_reflection: true
  artefact: 'Single-layer perceptron on AND + 2-3-1 sigmoid MLP on XOR with training error curve and decision surface. Evidence: E7.1-E7.3.'
  collapse_links: true
- id: unit8-seminar
  unit: '8'
  title: Comparing ML and Deep Learning Seminar
  activity: '"Three-part seminar preparation: (1) read Yu et al. (2024) on CNN vs conventional ML for supply chain management distribution cost and reflect critically; (2) reflect on explainability tooling (SHAP, LIME); (3) build a recommender system on MovieLens 100K and explain one prediction." (University of Essex Online, n.d.)'
  description: ''
  figure: /assets/images/unit-8/recommender_rmse_comparison.png
  figure_alt: Recommender RMSE comparison across three models on MovieLens 100K
  figure_caption: RMSE comparison across three collaborative filtering models on the MovieLens 100K dataset. E8.1
  body: ''
  micro_what: 'Worked through the Unit 8 seminar in three parts: read Yu et al. (2024) on CNN versus conventional ML for supply-chain prediction, reviewed SHAP and LIME as explainability tools, and built three recommender models on MovieLens 100K (Harper and Konstan, 2016). I started with the global mean baseline, then added user and item bias, then tested matrix factorisation with 20 factors and SGD. I also decomposed one prediction in SHAP style: μ + b_u + b_i + p·q = 3.530 + 0.241 + 0.351 + 0.183 = 4.305.'
  micro_what_lo:
  - LO3
  - LO4
  micro_so_what: 'The useful result was that the more complex model was not automatically better. RMSE moved from 1.140 for the baseline to 1.032 for the bias model, but matrix factorisation was 1.033 and the training curve showed overfitting. That made the seminar point more practical for me: a larger model still has to beat a simple baseline and explain its result. Yu et al. (2024) reported a strong CNN result, but I still wanted to know about variance, latency and feature attribution before treating it as the better option. This fits my current learning stage: I can script and compare models, but I still need the baseline and explanation step to stop myself trusting the larger model too quickly.'
  micro_so_what_lo:
  - LO3
  - LO4
  micro_now_what: For later work, I will keep the baseline in the comparison and not treat a more complex model as better just because it looks more advanced. I will check the metric, the training curve and at least one explanation of the prediction before making a claim. For the Individual Presentation, this means I should show why the selected model is good enough, not only that it produced a result.
