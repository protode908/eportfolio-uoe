  body: ''
  micro_what: Trained the tutorial CNN on CIFAR-10 (Krizhevsky and Hinton, 2009) using the four-convolution-layer Keras model. This was my first complete CNN training. I had Python and classical ML experience before, but not hands-on CNN work. After training, I ran the 15-image prediction-index exercise and checked the confidence values, not only the class labels. I also paired the activity with Wall (2019) on facial-recognition bias for the ethics part.
