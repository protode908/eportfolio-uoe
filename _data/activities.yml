- id: unit11-model-performance
  unit: '11'
  title: Model Performance Measurement Tutorial
  activity: '"Work through the model performance measurement notebooks: classification metrics (confusion matrix, precision, recall, F1, ROC AUC) and regression metrics (MAE, RMSE, R²). Run the parameter-change exercise (vary the signal-to-noise margin for AUC, vary polynomial degree for R²) and discuss what each metric does and does not say." (University of Essex Online, n.d.)'
  description: ''
  figure: /assets/images/unit-11/auc_signal_noise.png
  figure_alt: ROC curves at four signal-to-noise margins
  figure_caption: ROC curves at four signal-to-noise margins on a synthetic binary classifier. E11.1
  body: ''
  micro_what: 'Worked through the Unit 11 metric notebooks for both classification and regression. For classification, I changed the signal-to-noise margin and watched AUC move from 0.662 to 0.821, 0.961 and then 1.000. I also read the confusion matrix at margin 1.2: TN 670, FP 68, FN 91, TP 671, with Accuracy 0.894, Precision 0.908, Recall 0.881 and F1 0.894. For regression, I changed the polynomial degree and compared train against test R². Train R² kept rising, but test R² peaked at degree 2 with 0.888, then started to drop at higher degrees.'
  micro_what_lo:
  - LO1
  - LO3
  micro_so_what: 'AUC was part of a wider model evaluation; in my credit-risk proposal that I did for the previous module, I used ROC AUC to compare default-risk classifiers, then checked bad-class recall and a cost-sensitive version because false negatives were more expensive than false positives (Fawcett, 2006; Elkan, 2001). In the Numerical Analysis diabetes work, AUC showed reasonable separation between the two groups, but sensitivity was lower, so the model was better at ruling people out than catching every positive case. Here there was a bit of expansion on the usage, the data was synthetic and the signal-to-noise margin changed step by step. AUC moved from 0.662 to 0.821, 0.961 and then 1.000, so I could see directly how better separation changes the score. The confusion matrix then showed the other side: what happens at one specific threshold. The polynomial exercise made the same point for regression. The lesson is that a metric only helps if I explain what decision it supports: what error matters, what threshold is used, and whether the result still holds on test data.'
  micro_so_what_lo:
  - LO1
  - LO3
  micro_now_what: 'Among other areas, I am already using this in the Individual Presentation work. The lesson is to start with what error matters more, then choose the metric around that. For classification, that means AUC for separation, plus a confusion matrix, precision and recall at the threshold I actually use. For regression or model-capacity checks, I will show train and test results together so overfitting is visible. This is where my previous AUC work helps: I know the metric, but now I can explain better how it supports a decision, not only report the value.'
  micro_now_what_lo:
  - LO1
  - LO3
