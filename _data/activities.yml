cards:
- id: cd1
  unit: 1-3
  title: 'Collaborative Discussion 1: The 4th Industrial Revolution'
  activity: '"Discuss the impact of the 4th Industrial Revolution on a chosen industry: post an initial perspective grounded in current literature, respond substantively to at least two peers across Units 2-3, and close with a synthesis summary post by the end of Unit 3." (University of Essex Online, n.d.)'
  description: ''
  body: 'The summary post is where the discussion changed my view. I started by treating Industry 4.0 / 5.0 mainly as an efficiency opportunity. By the end, I saw it as a socio-technical dependency problem. The peer thread across automotive, healthcare, pharmaceutical and education examples drove that shift. No single sector example was enough on its own. The implementation gap is the point I carried forward: Industry 5.0 is framed around human-centricity, sustainability and resilience, but the public evidence (Accenture, 2025; World Economic Forum, 2025a) suggests these ideas are still more aspirational than implemented. The next question is governance. Recovery drills, manual fallback plans, supplier-risk controls, reskilling budgets and labour-impact assessments need funding, measurement and testing. Declarations are not enough.'
  micro_what: 'Initial post on my view based on previous module and this one: perspective on the 4th Industrial Revolution in the automotive sector. Engaged with colleagues who posted on healthcare and pharmaceutical industries'' impact, and provided a closure with a summary post. A mix of the cybersecurity risks and management of them balancing the benefits and contribution were discussed.'
  micro_what_lo:
  - LO1
  micro_so_what: 'It was evident a cross-industry pattern: automotive, healthcare and pharmaceutical all showed the same Industry 5.0 apparent implementation gap. My view changed from an efficiency angle in the initial post to a socio-technical dependency angle in the summary post. What worked: anchoring each peer response in a fresh academic source instead of restating peer arguments, that helped me and forced me to research and find alternative perspectives. What I would not repeat: I underweighted ethics in the opening framing and focused on it only in later responses.'
  micro_so_what_lo:
  - LO1
  micro_now_what: I can capitalise on bringing ethics earlier and broader research from the beginning. I have already looked at the CD2 content, and although it is about the legal and ethical views on ANN applications - another area - it will benefit from this enrichment on early engagement.
  micro_now_what_lo:
  - LO1
  feature: false
  deep_page: ''
  links:
  - label: INITIAL POST
    url: /assets/evidence/cd1/CD1_InitialPost_Mella2026.pdf
  - label: PEER RESPONSES
    url: /assets/evidence/cd1/CD1_PeerResponses_Mella2026.pdf
  - label: SUMMARY POST
    url: /assets/evidence/cd1/CD1_SummaryPost_Mella2026.pdf
  status: complete
  key_takeaway: 'I started this discussion thinking mostly about Industry 4.0 and efficiency, but the peer thread pushed me further. Automotive, healthcare and pharmaceutical examples all showed the same gap: Industry 5.0 sounds human-centred and resilient, but the hard part is actually implementing it. I should have brought ethics into my opening post, not only the later summary.'
  collapse_body: true
  collapse_reflection: true
  artefact: 'Three-part forum thread: initial post, peer responses (Peer A, Peer B), summary post. Evidence: ECD1.1-ECD1.5.'
  collapse_links: true
- id: unit2-eda-tutorial
  unit: '2'
  title: 'EDA Tutorial: AutoMPG Dataset'
  activity: '"Perform exploratory data analysis on the UCI Auto-mpg dataset: identify variable types, handle missing values, compute descriptive statistics, examine correlations and produce visualisations supporting an initial regression hypothesis." (University of Essex Online, n.d.)'
  description: ''
  figure: /assets/images/unit-2/heatmap_correlation.png
  figure_alt: Pearson correlation heatmap of the Auto-mpg numeric features
  figure_caption: Pearson correlation heatmap of the Auto-mpg numeric features. E2.7
  body: ''
  micro_what: Worked through the module's seminar exercise on EDA for the UCI Auto-mpg dataset (Quinlan, 1993), producing a correlation heatmap and scatter plots for the strongest predictors. I had practised parts of the classical-ML track before so this felt pretty familiar. The useful part here was testing one assumption at a time and seeing how things break.
  micro_what_lo:
  - LO2
  micro_so_what: 'Weight, displacement and horsepower were the main variables behind fuel economy, and the direction and association made sense: heavier cars, larger engines and higher horsepower all linked to lower MPG. The simple flow I used - load and check the shape, deal with missing values, run descriptive statistics, check the correlation matrix, then review distributions and pairwise plots - was similar to what I usually do in previous EDA exercises just that here I was forced to formalise it better and ground it academically. I used this as some sort of template later on for the Team Project and kept it as a pattern. What I would do differently: I read too much into the correlation heatmap before checking the distributions, then corrected that during the exercise.'
  micro_so_what_lo:
  - LO2
  - LO3
  micro_now_what: 'As I''m working in parallel I''m already using the same five-step workflow in the Team Project cleaning pipeline: check the dataset shape, deal with missing values, run descriptive statistics, review correlations, and then check distributions before drawing conclusions. Although I''m not in charge of the EDA I provided some assistance and guidance to the member in charge following this pattern and the necessary scripts for it. This should help me avoid treating a correlation heatmap as enough evidence on its own.'
  micro_now_what_lo:
  - LO3
  feature: false
  deep_page: ''
  links:
  - url: /assets/images/unit-2/scatter_mpg_vs_weight.png
    label: MPG VS WEIGHT
  - url: /assets/images/unit-2/scatter_mpg_vs_horsepower.png
    label: MPG VS HORSEPOWER
  status: complete
  key_takeaway: This activity reminded me not to jump too quickly from a heatmap to a conclusion. Correlation is useful, but only after I check the distributions and understand what the variables are doing. The five-step EDA flow became a pattern I reused later in the Team Project.
  collapse_reflection: true
  artefact: 'Pearson correlation heatmap + scatter plots (MPG vs weight, MPG vs horsepower) on UCI Auto-mpg. Evidence: E2.7-E2.9.'
  collapse_links: true
- id: unit3-corr-regression
  unit: '3'
  title: Correlation and Regression
  activity: '"Work through the four module notebooks (covariance and Pearson, linear regression, multiple linear regression, polynomial regression). For each, run the tutorial default and then change one parameter to observe how the technique reacts to noise, extrapolation, scale or capacity." (University of Essex Online, n.d.)'
  description: 'Run four notebooks with the default settings from tutorial and a few variable changes to show what breaks and where: covariance and Pearson, linear, multiple linear and polynomial regression.'
  figure: /assets/images/unit-3/ex4_polynomial_three_degrees.png
  figure_alt: Polynomial regression fitted at three degrees (1, 3 and 10)
  figure_caption: Polynomial regression at three degrees (deg 1, 3, 10). E3.4
  body: 'Four experiments on the tutorial datasets, each with a variable-change probe:


    - **Ex1 Pearson correlation**: In the default run, Pearson r is about 0.888. When I doubled the noise, it dropped to about 0.698. When I decoupled the variables, it almost disappeared at about 0.022. The covariance size stayed quite similar in the first two runs, so the main change was the spread of the points, not only the direction of the relationship. This helped me understand Pearson r better: it shows how tightly two variables move together, not just whether covariance is large. Similar to this exercise I had practised in numerical analysis in the previous module.

    - **Ex2 Linear regression**: The regression gave a slope of about -1.75, an intercept of about 103.1, and r ≈ -0.759. The in-range prediction at x = 10 matched the tutorial check, with y ≈ 85.59. The prediction at x = 20 gave y ≈ 68.08, but it is outside the observed range and the sample is only n = 13. This was a typical reminder that a regression line can still produce a number even when the prediction is not really reliable.

    - **Ex3 Multiple linear regression**: The model gave coefficients of Weight = 0.00755 and Volume = 0.00781, with an intercept of 79.70. The predicted CO2 value for Weight = 2300 and Volume = 1300 was about 107.21, which was in line with the tutorial. When I changed the weight to 3300 and kept the volume at 1300, the prediction increased to about 114.76. This made the weight effect easier to see: adding 1,000 kg increased the predicted CO2 by roughly 7.55, based on the model coefficient.

    - **Ex4 Polynomial regression**: I compared three polynomial degrees side by side in the figure above. The higher-degree model gave a better fit on the visible points, but that does not mean it is the better model. The main lesson was that a rising R² is not enough on its own. The real test is whether the model still generalises beyond the points used to fit it.'
  micro_what: 'Ran each notebook first with the default settings from the tutorial, then changed one variable at a time to see what happened: more noise, extrapolation, scaled prediction and polynomial degree. The three-degree polynomial figure made the point: deg 1 underfit, deg 3 fit the pattern, and deg 10 overfit. Lessons learned: model fit and generalisation are not the same thing.'
  micro_what_lo:
  - LO2
  - LO3
  micro_so_what: 'Each method made sense when the data supported the assumption behind it: Pearson needed the spread of the points to be checked, linear regression needed in-range prediction, multiple regression needed the predictors to make sense together, and polynomial regression needed a check against overfitting. The main lesson for me was not only the regression formulas. Each exercise forced a small design decision: what am I assuming before I trust the result? This is close to how I think in IT architecture: document the assumption first, make it rational, then test if the evidence supports it. It is not full hypothesis testing, but it has the same discipline. In the Team Project I incorporate this into the analysis. This helped me look at R² together with the modelling assumptions.'
  micro_so_what_lo:
  - LO2
  - LO3
  micro_now_what: 'As I''m working in parallel I already applied these four checks as a small modelling discipline to the Team Project scripts: check the spread before reporting a correlation, check the data range before using a fitted line, check whether the predictors make sense together before reading coefficients, and check whether a higher-degree model is just overfitting. In my results analysis for the Team Project I already use the same questions as my challenge framework (Mella, 2026n).'
  micro_now_what_lo:
  - LO3
  feature: false
  deep_page: ''
  links:
  - label: EX1 CORRELATION
    url: /assets/images/unit-3/ex1_correlation_three_regimes.png
  - label: EX2 LINEAR
    url: /assets/images/unit-3/ex2_linear_regression.png
  - label: EX3 MULTIPLE
    url: /assets/images/unit-3/ex3_multiple_regression.png
  status: complete
  key_takeaway: The regression notebooks made me slow down and write the assumption before trusting the result. A model can always produce a line or a higher R², but that does not mean it generalises. The main lesson for me was to check what the data actually supports before reading the metric as an answer.
  collapse_body: true
  collapse_reflection: true
  artefact: 'Four notebooks (correlation, linear, multiple linear, polynomial), each with default + variable-change run. Evidence: E3.1-E3.4.'
  collapse_links: true
  body_label: Show results
- id: unit4-linear-regression
  unit: '4'
  title: Linear Regression with scikit-learn
  activity: '"Apply linear regression with scikit-learn: first replicate the FuelConsumption demo (CO2 vs engine size), then move to the World Bank GDP and Population datasets (2001-2021) to compute a country-level Pearson correlation and a linear regression of mean population on mean per-capita GDP." (University of Essex Online, n.d.)'
  description: ''
  figure: /assets/images/unit-4/ex2_population_vs_per_capita_gdp.png
  figure_alt: Population vs per-capita GDP, raw and log-log panels
  figure_caption: Mean population versus mean per-capita GDP, raw and log-log scales. E4.2
  body: ''
  micro_what: 'Replicated the FuelConsumption scikit-learn demo first, using engine size to predict CO2 emissions. Then I moved to the World Bank 2001-2021 data (World Bank, 2024a, 2024b) and tested mean population against mean per-capita GDP by country, first on raw scale and then on log-log scale. The useful part was not only fitting the line. It was the preparation before the line: regional aggregates such as WLD, EUU and OED distorted the country-level Pearson view, so they had to be filtered out before the result made sense.'
  micro_what_lo:
  - LO2
  - LO3
  micro_so_what: 'This exercise was less about learning that linear regression exists, because I had some basic classical ML practice already. The growth for me was in the workflow around it. I had to clean the input, remove aggregate rows, decide the scale, run the same comparison again, and only then read the correlation and regression result. That is close to how I work with scripts in my normal technical work: not building software products, but making small repeatable steps that reduce mistakes. What I would do differently: I went to Pearson on the raw scale too quickly, then only moved to log-log after the plot made the problem obvious.'
  micro_so_what_lo:
  - LO2
  - LO3
  micro_now_what: For the Team Project I'm already applying pre-processing and scale choice as part of the modelling result. Before I report a correlation or fitted line, I'm checking now whether the rows are really comparable, whether aggregates are mixed with real observations, and whether the raw scale is hiding the pattern. This is part as well of my proposal to use a 5-stage script workflow analogous in stages to CRISP-DM so it stays simple but easy to rerun checks after changing one decision.
  micro_now_what_lo:
  - LO3
  feature: false
  deep_page: ''
  links:
  - url: /assets/images/unit-4/ex1_fuel_co2_vs_enginesize.png
    label: FUEL CO2 vs ENGINE
  - url: /assets/images/unit-4/ex2_population_vs_per_capita_gdp_loglog.png
    label: LOG-LOG REGRESSION
  status: complete
  key_takeaway: 'The useful learning was not only fitting the regression line. It was everything before the line: removing regional aggregates, checking whether rows were comparable, and choosing the right scale. Once I did that, the result became much easier to defend.'
  collapse_reflection: true
  artefact: 'FuelConsumption CO2 vs engine size + Population vs per-capita GDP regression (raw and log-log). Evidence: E4.1-E4.3.'
  collapse_links: true
- id: unit5-jaccard
  unit: '5'
  title: Jaccard Coefficient Calculations
  activity: '"Compute the Jaccard similarity coefficient for three patients on a six-attribute clinical record (Fever, Cough, Test 1-4) using the asymmetric-binary encoding rule, then explain which pair is most similar and which is least." (University of Essex Online, n.d.)'
  description: ''
  figure: /assets/images/unit-5/jaccard_heatmap.png
  figure_alt: Jaccard coefficient matrix for the three patients
  figure_caption: Jaccard coefficient matrix for three patients on six clinical attributes. E5.1
  body: ''
  micro_what: Worked through the three-patient Jaccard example by hand first, using the six binary attributes to count M11, M10 and M01. Then I reproduced the same calculation in code and checked the heatmap and decomposition plot. Doing it by hand before coding helped me see that the main decision was not the formula itself, but how the attributes were encoded before the similarity score was calculated.
  micro_what_lo:
  - LO2
  micro_so_what: 'The useful lesson was that similarity scores are not neutral if the encoding is unclear. In this example, the absent-versus-not-done attribute changes the denominator, so treating it as 0 changes the Jaccard result. That rule has to be decided before the calculation, not adjusted after the heatmap looks strange. This would fit the way I normally build Python scripts: small repeatable checks, but with the data rules written down first.'
  micro_so_what_lo:
  - LO2
  micro_now_what: 'For the Team Project I''m already embedding this type of logic in the 5-script pipeline: I keep the encoding step separate and visible before running any similarity or distance calculation. If I convert categories into binary columns, I write down what 1 and 0 mean and check whether the distance calculation is still fair. This is especially important for K-means, because a small encoding choice can change which listings appear close to each other.'
  micro_now_what_lo:
  - LO2
  feature: false
  deep_page: ''
  links:
  - url: /assets/images/unit-5/jaccard_decomposition.png
    label: JACCARD DECOMPOSITION
  status: complete
  key_takeaway: Jaccard looked simple at first, but the activity showed me that the formula is not the whole issue. If the encoding rule is unclear, the similarity score can become misleading. I need to decide what 1 and 0 mean before calculating anything, not after the heatmap looks odd.
  collapse_reflection: true
  artefact: 'Jaccard similarity matrix and M11/M10/M01 decomposition for three patients on six binary attributes. Evidence: E5.1-E5.2.'
  collapse_links: true
- id: unit6-team-project
  unit: 1-6
  title: "Team Project: Project Report"
  activity: '"Group D, Track 1: develop a classical ML solution (regression for price prediction, clustering for customer segmentation) on the Airbnb NYC 2019 dataset to address an agreed business question. Deliver a 1,000-word executive analytical report and a peer-review form, as a virtual development team, by 23:55 UK on 8 June 2026." (University of Essex Online, n.d.)'
  description: Group D, Airbnb NYC 2019. Track 1 classical ML project using regression for price prediction and clustering for listing segmentation. The work was shaped as a 1,000-word executive analytical report, mapped to CRISP-DM and supported by scripts, meeting records and a decision log and design document. The activity ran from week 1 team formation to the week 6 submission.
  body: 'Group D had six members. I took the Coordinator role from week 1 and covered the practical coordination work: meeting setup, minutes, asset repository, group communications, timeline tracking and risk management. As the project developed, my contribution also covered the ML workstream, the written-report workstream and support for EDA / cleaning. For ML, I worked through the regression and clustering pipeline on the AB_NYC_2019 Airbnb dataset. For the report, I acted as the integrator so the business question, results, limitations and recommendations are coherent and consistent. For EDA and cleaning, I produced the design specification, a cleaning script and a handover note for the workstream responsible. The project page keeps the main evidence: kickoff deck, working agreement, decision log, meeting deck, scripts, design documents and email records.'
  micro_what: 'Took the Coordinator role in Group D and kept the work moving through meetings, minutes, repository setup, communications, timeline checks and risk tracking. The group had six members, but three were functionally active across weeks 1-6, so task allocation had to follow actual engagement rather than the original plan. My work covered three areas: ML workstream responsible for the regression and clustering run on AB_NYC_2019, written report workstream responsible as integrator, and EDA / cleaning support through the design specification, cleaning script and handover material.'
  micro_what_lo:
  - LO2
  - LO3
  - LO4
  micro_so_what: 'The main lesson was that coordination is not separate from the technical work when the group is uneven. If meetings are missed and tasks are not picked up, the critical path has to stay with the people who are actually active. That fits Weick (1976) loose coupling: the group can stay flexible, but only if the links between tasks are visible enough to manage. Faraj and Sproull (2000) and Cramton (2001) also helped me frame coordination as part of team performance, not just admin. The three-tier decision process I built for the project (Mella, 2026j) gave me a practical way to keep decisions traceable without making the process too heavy (Sackett et al., 1996; Hevner et al., 2004). What I would not repeat: I worked around partial attendance for too long before escalating it. By mid-project, the same pattern was still creating risk, including a late-appearing member asking for onboarding while the shared documentation had already been available.'
  micro_so_what_lo:
  - LO4
  micro_now_what: 'For the Individual Presentation, I will keep the same practical habits but apply them earlier: define the scope, keep a short choice log, record limits beside the result, and check that the evidence supports the claim before I present it. For group work, I will also escalate non-engagement sooner. Waiting too long protects the tone of the group, but it can create extra risk for the active members.'
  micro_now_what_lo:
  - LO3
  - LO4
  feedback: Placeholder - tutor grade and feedback to be added once received.
  feature: true
  feature_pill: TEAM PROJECT
  deep_page: /projects/team-project/
  links: []
  status: complete
  key_takeaway: This project taught me that coordination is part of the technical work, not something separate from it. Because the group engagement was uneven, I had to keep decisions traceable and allocate work around who was actually active. The three-tier decision process helped, but I should have escalated non-engagement earlier.
  collapse_body: true
  collapse_reflection: true
- id: unit6-kmeans-tutorial
  unit: '6'
  title: K-Means Clustering Tutorial
  activity: '"Apply k-means clustering on three reference datasets: Iris and Wine compared against their species / cultivar labels (purity, ARI) and a WeatherAUS sample unsupervised (elbow + PCA). Discuss the choice of k and the interpretation of cluster labels." (University of Essex Online, n.d.)'
  description: ''
  figure: /assets/images/unit-6/kmeans_pca_three_datasets.png
  figure_alt: PCA scatter of k-means clusters across Iris, Wine and WeatherAUS
  figure_caption: PCA scatter of k-means clusters across the Iris, Wine and WeatherAUS datasets. E6.K1
  body: ''
  micro_what: 'Ran k-means on three reference datasets in two different ways. Iris (Fisher, 1936) and Wine (Aeberhard, Coomans and de Vel, 1992) had labels, so I could compare the clusters against species / cultivar labels using purity and ARI. WeatherAUS (Young, 2019) had no target label for this task, so I used elbow and PCA plots to inspect the grouping. I used this as the working pattern for the Team Project clustering step: standardise first, test more than one k, then inspect the group profiles before naming the clusters.'
  micro_what_lo:
  - LO2
  - LO4
  micro_so_what: 'The three datasets did not behave the same, which was the useful part. Wine looked like the clean example, Iris was close but not perfect, and WeatherAUS did not give one obvious answer for k. That made me more careful with clustering. A cluster label is not a real category just because the algorithm produced it. ARI was more useful than purity when real labels existed, and standardisation had to happen before distance-based clustering. What I would not repeat: I looked too hard for a sharp elbow on WeatherAUS before accepting that the data was not that neat.'
  micro_so_what_lo:
  - LO1
  - LO2
  - LO4
  micro_now_what: 'In the Team Project I have already applied this discipline in `05_clustering.py`, the clustering stage of the 5-script pipeline: I scale the variables, compare several k values, check elbow and silhouette together, and inspect the cluster profiles before writing any label. Each of these choices is logged in the three-tier decision process so the rationale is traceable. The Airbnb groupings are listing segments, not customer groups, and I name them that way directly in the report.'
  micro_now_what_lo:
  - LO4
  feature: false
  deep_page: ''
  links:
  - url: /assets/images/unit-6/weatherAUS_elbow.png
    label: WEATHERAUS ELBOW
  - url: /assets/images/unit-6/weatherAUS_k_grid.png
    label: WEATHERAUS K GRID
  status: complete
  key_takeaway: K-means made me more careful with clustering. A cluster is not a real-world category just because the algorithm produced it. I learned to standardise first, compare more than one k, and use ARI or profile checks before giving clusters a business meaning.
  collapse_reflection: true
  artefact: 'K-means on Iris and Wine (purity / ARI) + WeatherAUS (elbow + PCA). Evidence: E6.K1-E6.K3.'
  collapse_links: true
- id: midmodule-reflection
