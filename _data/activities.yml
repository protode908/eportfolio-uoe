  body: 'In the middle of the journey I had a realisation moment where I connected all dots: this module was clearly the culmination of all the other domains I have been taught in the programme bringing together a coherent practice: Understanding AI as the foundation (including the WEKA exercise I genuinely enjoyed), Launch into Computing as the engineering toolkit which most content I already knew but forced me to look with historical and academic perspective which I lacked, Numerical Analysis as the mathematical and statistical grounding (descriptive statistics, hypothesis testing, distributions, numerical methods) to read, challenge and critically present and gain so-called numeracy skills, with the courses in mathematics and ML I did beforehand to the programme to prepare myself, and the baggage of twenty years plus of architecture work under my skin. The deep learning weeks were where everything connected to step up my learning journey, and most of my fears about the technical challenge fell away. By then I was already deep into making the modeling and test for the final assignment, and this module turned curiosity into momentum.'
