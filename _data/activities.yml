  - LO2
  - LO3
  micro_so_what: 'The model reached 0.7782 test accuracy, but the curve was more useful than the headline number. Validation accuracy peaked around epoch 13, then flattened while training accuracy kept rising, so the mild overfitting was visible. The 15-image check also helped: all 15 were correct, but confidence still ranged from 0.460 for a cat/dog case to 1.000 for easier images such as truck and horse. That made me read predictions with more caution. Wall (2019) also made the ethics point clear. Object recognition can be useful, but the same type of model can be moved into surveillance. I should ask what the model is being used for before treating accuracy as the main success measure.'
