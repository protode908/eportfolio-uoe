- id: unit12-future-of-ml
  unit: '12'
  title: Future of Machine Learning
  activity: '"Unit 12 seminar on the future of machine learning: discuss how AI-driven automation is reshaping industries, examining Self-Supervised Learning, Neural Architecture Search and Edge AI, and the cross-cutting questions of ethics, scalability and sustainability." (University of Essex Online, n.d.)'
  description: 'Unit 12 seminar on how AI-driven automation is reshaping industries. Four lenses: Self-Supervised Learning, Neural Architecture Search, Edge AI, and the cross-cutting questions of ethics, scalability and sustainability. Read against the Industry 5.0 human-centric framing and the implementation gap from CD1.'
  body: 'The seminar asks how Self-Supervised Learning reduces labelled-data dependence, what Neural Architecture Search changes, how Edge AI supports on-device inference, and how ethics, scalability and sustainability hold up as AI adoption keeps moving.


    Although they may seem like separate topics, they are all part of the chain and "intertwined". The hardware point resonates with me. It is not strange to me; it is the opposite. I saw GPUs first in the 1990s as 3D accelerators for games, then later as parallel-computing devices, and now as the hardware base behind much of AI and ML. I saw the impact again in my Individual Presentation work: some Intel CPU runs were taking almost a day, while Apple silicon GPU support on my M4 Pro lab machine made similar runs about 5x quicker.


    Self-Supervised Learning connects directly to this. Labelled data is still a challenge, but SSL can learn from unlabelled data first, then use smaller labelled tasks later. Without accelerators and parallel computing, the recent wave of LLMs, CNNs, diffusion models and large-scale recommenders would likely not be developed as they are today. NAS is the area where I have less practice and hands-on evaluation, however, research shows me the advantage: search candidate architectures rather than designing everything manually. But it comes with a trade-off: more need for compute and energy, and an angle on transparency that requires careful exploration.


    There is also a real hardware-software dependency discussion. CUDA gives NVIDIA a strong vertical stack around its own hardware, while ROCm and other open or multi-vendor approaches argue for a more open path. Without judging which side is right, the discussion is real. Edge AI adds the dual-use angle: a local accelerator in a drone, robot, sensor or industrial camera can support safety and inspection, but it can also support systems I would not want to defend. The Industry 5.0 frame helps me keep the human, sustainability and resilience questions beside the technical capability (European Commission, 2021; Metcalf, 2024).'
  micro_what: 'Read the four seminar topics: Self-Supervised Learning, Neural Architecture Search, Edge AI, and the ethics-scalability-sustainability questions. I connected them to Industry 5.0 (European Commission, 2021), my own history with GPU acceleration, and the compute difference I saw in the Individual Presentation work. Intel CPU runs were taking almost a day, while Apple silicon GPU support on my M4 Pro lab machine made similar runs about 5x quicker.'
  micro_what_lo:
  - LO1
  - LO3
  micro_so_what: 'The seminar made AI scale feel concrete. GPUs are not new in my technical life: I saw them as 3D accelerators in the 1990s, then as parallel-computing hardware, and now as AI/ML accelerators. SSL connects to that because it can learn from unlabelled data, but only at useful scale when the compute is there. NAS adds another compute question: it can search architectures, but the search itself has a cost. The industry is still moving, but the dependency is clear. Models, accelerators, CUDA-like software stacks, open alternatives and Python ML frameworks all shape what can actually be built and repeated.'
  micro_so_what_lo:
  - LO1
  - LO3
  micro_now_what: For future AI work, I will not start with the model score only. I will ask what problem is being solved, what data is labelled or unlabelled, what hardware is needed, whether it runs on server or edge, and who is affected if it is used. A model that works well on a GPU may be too slow on CPU, too expensive to repeat, or dependent on hardware access that is not guaranteed. I will also keep the dual-use question visible. The same accelerator and model can support a useful industrial system or a harmful autonomous one, so the real decision is not only "can we automate this?", but "should we automate it here, and under what controls?".
  micro_now_what_lo:
  - LO1
  - LO3
  - LO4
  feature: false
  deep_page: ''
  links: []
  status: complete
  key_takeaway: This seminar made me think about AI less as "just the model" and more as a full dependency chain. SSL, NAS and Edge AI only work at useful scale when the hardware, energy and deployment context support them. The Industry 5.0 lens helped me keep the human, resilience and dual-use questions beside the technical excitement.
