- id: unit11-cnn-object-recognition
  unit: '11'
  title: Individual Presentation
  activity: '"Deliver a 20-minute individual presentation comparing classical machine learning and deep learning on a chosen problem, with critical evaluation, explainability and an ethics section. Submission 13 July 2026." (University of Essex Online, n.d.)'
  description: 'My Individual Presentation: paediatric chest X-ray classification compared across classical ML (HOG features + SVM) and deep learning (ResNet50 transfer learning). Same data, same test set, same metrics. Built on the three-tier decision process from the Team Project, applied here to roughly 20 modelling decisions.'
  micro_what: 'I built two competing classifiers on the Kermany et al. (2018) paediatric chest X-ray dataset: HOG + SVM on the classical side, and ResNet50 transfer learning on the deep-learning side. I kept the same train/validation split and the same held-out test set across both pipelines so the comparison was fair. The headline numbers were SVM macro-F1 0.6846 with a 27-point CV-test gap, and CNN macro-F1 0.7721 with a 12-point CV-test gap. The CNN generalised about twice as cleanly, so I recommended ResNet50 as the triage candidate with five non-negotiable safeguards: clinician-set threshold, region-importance heatmap on demand, weekly subgroup monitoring, OOD rejection of adult X-rays, and human-in-the-loop always. The EDA stage reused the 5-script pipeline shape from the Team Project. The three-tier decision process was extended to roughly 20 modelling decisions, each tagged Tier A, Tier B or Tier C.'
  micro_what_lo:
  - LO2
  - LO3
  micro_so_what: 'I am critical of myself here. I took on more than I should have for one person on a hard deadline. I picked a clinical-imaging problem with no prior experience in image processing or chest-X-ray imaging, then added transfer learning, two empirical comparison tests, XAI on both models, subgroup analysis, calibration discussion and a UML deployment architecture diagram. The scope matched the assignment, but it stretched the work too far. The cost showed. Numbers drifted between runs: SVM macro-F1 0.6480 -> 0.6846, and CNN macro-F1 0.8750 -> 0.7721 across versions. I also had moments where I mixed numbers from different runs in the deck and transcript, and reviewer rounds caught at least four of those.


    Three lessons stay with me. First, read the framework documentation before trusting a code pattern. My Keras unfreeze loop was inert because the parent model trainable flag propagated down to nested children. What actually ran was a frozen-base feature extractor, so I reframed it honestly as a frozen-base baseline and kept the real two-phase fine-tune as future work. Second, trained-model weights are not session state. I did not preserve the v8 weights as a file, so changing one XAI tool meant a re-train and a split evidence chain. Saving the model is methodology, not housekeeping. Third, a single-seed comparison is weak for stochastic CNN training. Multi-seed averaging is needed if the comparison is meant to carry weight. The three-tier decision process helped because every choice still had a Tier A/B/C tag and a citation, even when the value or implementation needed correction.'
  micro_so_what_lo:
  - LO3
  micro_now_what: 'For the next ML-heavy piece of work, I will scope smaller and go deeper. One person on a hard deadline cannot cover image-processing basics, clinical-image domain learning, transfer learning, two empirical tests, two XAI methods, subgroup analysis, calibration and a UML deployment diagram all with the same depth. I will also persist model weights from day one, with version tags tied to the result files, so a reviewer-driven change does not force a re-train. I will read framework documentation before trusting code patterns, especially where propagation rules can override what looks explicit. The three-tier decision process travels with me: every modelling choice gets a Tier A/B/C tag with a citation, even if the value later changes, because that lets me correct the work without hiding the mistake.'
  micro_now_what_lo:
  - LO3
  - LO4
