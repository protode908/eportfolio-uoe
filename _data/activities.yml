  unit: '9'
  title: CNN Model Activity
  activity: '"Train the tutorial CIFAR-10 CNN, run the prediction-index exercise on x_test[1..15], and discuss the model''s behaviour. Read Wall (2019) on facial-recognition bias and produce a paired ethics commentary." (University of Essex Online, n.d.)'
  description: ''
  figure: /assets/images/unit-9/prediction_grid_1_to_15.png
  figure_alt: 3x5 grid of CIFAR-10 test predictions for indices 1-15
