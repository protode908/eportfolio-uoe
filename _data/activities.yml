- id: unit10-cnn-tutorial
  unit: '10'
  title: CNN Tutorial
  activity: '"Use the CNN Explainer (Wang et al., 2020) to step through the Tiny VGG model: walk a custom input through the convolution, ReLU and pooling layers, observe the layer-wise activations, and discuss what the model does and where it fails." (University of Essex Online, n.d.)'
  description: ''
  figure: /assets/images/unit-10/inputs_panel.jpg
  figure_alt: 2x2 panel of the four CNN Explainer inputs
  figure_caption: Four-input experiment panel through the CNN Explainer Tiny VGG model. E10.0
  body: 'Four custom inputs through the Wang et al. (2020) CNN Explainer Tiny VGG model (10 classes including school_bus, orange, espresso, ladybug, sport_car):


    | # | Input | Source | Predicted | Confidence | Reading |

    |---|---|---|---|---:|---|

    | 1 | US yellow school bus | Vonore Middle School (2025) | school_bus | 0.9730 | In-distribution baseline: confident and correct |

    | 2 | Argentinian orange school bus | TN (2024) | sport_car | 0.5137 | Dataset bias: ~18.7x lower confidence on correct label (school_bus 0.0274) |

    | 3 | NYC yellow taxi | Williamson (2024) via Alamy | orange (the fruit) | 0.4169 | Colour beats shape: yellow saturation dominates vehicle geometry (school_bus 0.1790) |

    | 4 | Selfie | author''s own photograph | espresso | 0.5686 | OOD softmax overconfidence: model commits to a non-existent class |


    Case 2 follows the same pattern as Buolamwini and Gebru (2018) Gender Shades, moved from faces to objects. Cases 3 and 4 expose the softmax-overconfidence problem behind the Unit 9 deployment-risk argument.'
  micro_what: 'Used the Wang et al. (2020) CNN Explainer Tiny VGG model with four custom inputs: a US yellow school bus (Vonore Middle School, 2025), an Argentinian orange school bus (TN, 2024), a NYC yellow taxi (Williamson, 2024 via Alamy), and a selfie as an out-of-distribution input. I recorded the predicted class and confidence: school_bus 0.9730, sport_car 0.5137, orange 0.4169, and espresso 0.5686. The Argentinian bus case made the dataset-bias point very concrete for me because it''s related to my own personal background.'
