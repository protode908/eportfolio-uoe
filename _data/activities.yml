  micro_so_what: 'The four inputs showed three failure modes: dataset bias, colour beating shape, and softmax confidence on an out-of-distribution image. The selfie result was the clearest warning because the model still forced a label, espresso, with 0.5686 confidence. This connected with how I think in cyberresiliency: do not only test the normal case. Push the edge cases and check where the assumptions fail.'
